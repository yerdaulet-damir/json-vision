name: 💡 Feature / new view style
description: Suggest a feature or a new auto-detected data shape
labels: [enhancement]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like?
      description: e.g. "a Map view for GeoJSON", "detect Elasticsearch hits", "export filtered slice".
    validations:
      required: true
  - type: input
    id: shape
    attributes:
      label: Example data shape (no private data)
      description: A small synthetic example of the JSON shape, if relevant.
    validations:
      required: false
